name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3️⃣ Build with Maven
      - name: Build project
        run: mvn clean package

      # 4️⃣ Run tests
      - name: Run tests
        run: mvn test

      # 5️⃣ Upload WAR artifact
      - name: Upload WAR file
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: target/*.war

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      # 6️⃣ Download build artifact
      - name: Download WAR
        uses: actions/download-artifact@v4
        with:
          name: app-war

      # 7️⃣ Deploy to Tomcat (example using SCP)
      - name: Deploy to Tomcat server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TOMCAT_HOST }}
          username: ${{ secrets.TOMCAT_USER }}
          password: ${{ secrets.TOMCAT_PASSWORD }}
          source: "*.war"
          target: "/opt/tomcat/webapps/"